version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: floodrisk_db
    environment:
      POSTGRES_DB: floodrisk
      POSTGRES_USER: floodrisk
      POSTGRES_PASSWORD: floodrisk_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: floodrisk_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
